{% extends 'app/account_base.html' %}
{% block content %}
<style>
	.account-password-form {
		max-width: 500px;
	}
	
	.account-password-form-group {
		margin-bottom: 24px;
	}
	
	.account-password-form-label {
		display: block;
		font-size: 14px;
		font-weight: 500;
		color: #000;
		margin-bottom: 8px;
	}
	
	.account-password-form-input {
		width: 100%;
		padding: 12px 16px;
		background: #F5F5F7;
		border: none;
		border-radius: 10px;
		font-size: 15px;
		color: #000;
		font-family: inherit;
		transition: all 0.2s;
		box-sizing: border-box;
	}
	
	.account-password-form-input:focus {
		outline: none;
		background: #EEEEEE;
	}
	
	.account-password-form-input::placeholder {
		color: #888;
	}
	
	.account-password-form-actions {
		display: flex;
		justify-content: flex-end;
		margin-top: 32px;
		padding-top: 32px;
		border-top: 1px solid #E5E5E5;
	}
	
	.account-password-form-btn {
		padding: 12px 24px;
		background: #000;
		color: #FFFFFF;
		border: none;
		border-radius: 12px;
		font-size: 15px;
		font-weight: 600;
		cursor: pointer;
		transition: all 0.2s;
	}
	
	.account-password-form-btn:hover {
		background: #333;
	}
	
	.account-password-form-btn:disabled {
		background: #E5E5E5;
		color: #888;
		cursor: not-allowed;
	}
	
	.account-password-hint {
		font-size: 13px;
		color: #888;
		margin-top: 8px;
		line-height: 1.4;
	}
</style>

<div class="account-password-form">
	<div class="account-password-form-group">
		<label class="account-password-form-label">当前密码</label>
		<input type="password" id="currentPassword" class="account-password-form-input" placeholder="输入当前密码" />
	</div>
	
	<div class="account-password-form-group">
		<label class="account-password-form-label">新密码</label>
		<input type="password" id="newPassword" class="account-password-form-input" placeholder="至少8位，含大小写与数字" />
		<div class="account-password-hint">密码应包含至少8个字符，包括大写字母、小写字母和数字</div>
	</div>
	
	<div class="account-password-form-group">
		<label class="account-password-form-label">确认新密码</label>
		<input type="password" id="confirmPassword" class="account-password-form-input" placeholder="再次输入新密码" />
	</div>
	
	<div class="account-password-form-actions">
		<button type="button" class="account-password-form-btn" onclick="savePassword()">保存更改</button>
	</div>
</div>

<script>
function validatePassword(password) {
	// 至少8位，含大小写和数字
	const minLength = password.length >= 8;
	const hasUpper = /[A-Z]/.test(password);
	const hasLower = /[a-z]/.test(password);
	const hasNumber = /[0-9]/.test(password);
	return minLength && hasUpper && hasLower && hasNumber;
}

function savePassword() {
	const currentPassword = document.getElementById('currentPassword')?.value || '';
	const newPassword = document.getElementById('newPassword')?.value || '';
	const confirmPassword = document.getElementById('confirmPassword')?.value || '';
	
	if(!currentPassword) {
		alert('请输入当前密码');
		return;
	}
	
	if(!newPassword) {
		alert('请输入新密码');
		return;
	}
	
	if(!validatePassword(newPassword)) {
		alert('密码不符合要求：至少8位，包含大写字母、小写字母和数字');
		return;
	}
	
	if(newPassword !== confirmPassword) {
		alert('两次输入的密码不一致');
		return;
	}
	
	if(newPassword === currentPassword) {
		alert('新密码不能与当前密码相同');
		return;
	}
	
	// TODO: 调用 API 修改密码
	alert('密码修改提交（示例）');
}
</script>
{% endblock %}
