<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="/static/styles.css">
	<script src="/static/smooth-scroll.js" defer></script>
	<script src="/static/page-transition.js" defer></script>
	<title>心理咨询 - YuNi</title>
	<style>
		* {
			box-sizing: border-box;
		}
		
		body.aw {
			background: #FAFAFA;
			margin: 0;
			padding: 0;
			height: 100vh;
			overflow: hidden;
		}
		
		html {
			overflow: hidden;
			height: 100%;
		}
		
		.mental-health-container {
			display: flex;
			height: calc(100vh - 80px);
			margin-top: 80px;
			overflow: hidden;
		}
		
		.sidebar {
			width: 280px;
			background: #FFFFFF;
			border-right: 1px solid #E5E5E5;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			flex-shrink: 0;
		}
		
		.sidebar-title {
			font-size: 16px;
			font-weight: 700;
			color: #000;
			padding: 20px;
			border-bottom: 1px solid #E5E5E5;
			flex-shrink: 0;
		}
		
		.history-list {
			flex: 1;
			overflow-y: auto;
			padding: 8px;
		}
		
		.history-item {
			padding: 12px 16px;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.2s;
			margin-bottom: 4px;
		}
		
		.history-item:hover {
			background: #F5F5F5;
		}
		
		.history-item.active {
			background: #F3F4F6;
		}
		
		.history-item-title {
			font-size: 14px;
			font-weight: 600;
			color: #000;
			margin-bottom: 4px;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
		
		.history-item-time {
			font-size: 12px;
			color: #888;
		}
		
		.history-item-actions {
			display: flex;
			gap: 8px;
			margin-top: 4px;
		}
		
		.history-delete-btn {
			font-size: 11px;
			color: #999;
			cursor: pointer;
			padding: 2px 6px;
			border-radius: 4px;
			transition: all 0.2s;
		}
		
		.history-delete-btn:hover {
			background: #F5F5F5;
			color: #F00;
		}
		
		.clear-all-btn {
			padding: 8px 16px;
			margin: 12px;
			background: #FFF;
			border: 1px solid #E5E5E5;
			border-radius: 6px;
			font-size: 13px;
			color: #666;
			cursor: pointer;
			transition: all 0.2s;
		}
		
		.clear-all-btn:hover {
			background: #F5F5F5;
			border-color: #000;
			color: #000;
		}
		
		.main-workspace {
			flex: 1;
			height: 100vh;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			background: #FFFFFF;
		}
		
		.header-toolbar {
			height: 60px;
			flex-shrink: 0;
			border-bottom: 1px solid #E5E5E5;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 24px;
			background: #FFFFFF;
			z-index: 5;
			position: relative;
		}
		
		.header-title {
			font-size: 18px;
			font-weight: 700;
			color: #000;
		}
		
		.mode-selector {
			display: flex !important;
			align-items: center;
			gap: 12px;
			flex-shrink: 0;
		}
		
		.mode-label {
			font-size: 14px;
			color: #666;
			font-weight: 500;
			white-space: nowrap;
		}
		
		.mode-select {
			padding: 6px 12px;
			border: 1px solid #E5E5E5;
			border-radius: 6px;
			background: #FFFFFF;
			font-size: 14px;
			color: #000;
			cursor: pointer;
			outline: none;
			transition: all 0.2s;
			min-width: 160px;
		}
		
		.mode-select:hover {
			border-color: #000;
		}
		
		.mode-select:focus {
			border-color: #000;
			box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
		}
		
		@media (max-width: 980px) {
			.mode-selector {
				display: flex !important;
			}
			.mode-label {
				display: none;
			}
			.mode-select {
				min-width: 140px;
			}
		}
		
		.chat-area {
			flex: 1;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			padding: 24px;
			background: #FFFFFF;
		}
		
		.chat-messages {
			flex: 1;
			display: flex;
			flex-direction: column;
			gap: 24px;
			max-width: 800px;
			width: 100%;
			margin: 0 auto;
		}
		
		.message {
			display: flex;
			gap: 12px;
			animation: fadeIn 0.3s ease;
		}
		
		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
		
		.message.user {
			flex-direction: row-reverse;
		}
		
		.message-avatar {
			width: 32px;
			height: 32px;
			border-radius: 50%;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			background: #F5F5F5;
		}
		
		.message-avatar img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			border-radius: 50%;
		}
		
		.message.user .message-avatar {
			background: #E5E5E5;
		}
		
		.message.ai .message-avatar {
			background: #F5F5F5;
		}
		
		.message-content {
			flex: 1;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		
		.message-bubble {
			padding: 12px 16px;
			border-radius: 12px;
			max-width: 80%;
			line-height: 1.6;
			font-size: 14px;
		}
		
		.message.user .message-bubble {
			background: #000;
			color: #FFF;
			border-bottom-right-radius: 4px;
		}
		
		.message.ai .message-bubble {
			background: #F5F5F5;
			color: #000;
			border-bottom-left-radius: 4px;
		}
		
		.message-sources {
			margin-top: 8px;
			padding: 12px;
			background: #FAFAFA;
			border-radius: 8px;
			border-left: 3px solid #E5E5E5;
		}
		
		.message-sources-title {
			font-size: 12px;
			font-weight: 600;
			color: #666;
			margin-bottom: 8px;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}
		
		.source-item {
			font-size: 12px;
			color: #666;
			padding: 6px 0;
			border-bottom: 1px solid #F0F0F0;
		}
		
		.source-item:last-child {
			border-bottom: none;
		}
		
		.source-content {
			margin-bottom: 4px;
		}
		
		.source-score {
			font-size: 11px;
			color: #999;
		}
		
		.loading-message {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 12px 16px;
			background: #F5F5F5;
			border-radius: 12px;
			border-bottom-left-radius: 4px;
			max-width: 80%;
		}
		
		.loading-text {
			font-size: 14px;
			color: #666;
		}
		
		.loading-dots {
			display: flex;
			gap: 4px;
		}
		
		.loading-dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: #999;
			animation: loadingDot 1.4s infinite;
		}
		
		.loading-dot:nth-child(2) {
			animation-delay: 0.2s;
		}
		
		.loading-dot:nth-child(3) {
			animation-delay: 0.4s;
		}
		
		@keyframes loadingDot {
			0%, 60%, 100% {
				transform: translateY(0);
				opacity: 0.3;
			}
			30% {
				transform: translateY(-8px);
				opacity: 1;
			}
		}
		
		.empty-state {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			color: #999;
			text-align: center;
			padding: 40px;
		}
		
		.empty-state-icon {
			font-size: 48px;
			margin-bottom: 16px;
		}
		
		.empty-state-text {
			font-size: 16px;
			margin-bottom: 8px;
		}
		
		.empty-state-hint {
			font-size: 14px;
			color: #999;
		}
		
		.input-area {
			flex-shrink: 0;
			padding: 24px;
			border-top: 1px solid #E5E5E5;
			background: #FFFFFF;
		}
		
		.input-container {
			max-width: 800px;
			margin: 0 auto;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}
		
		.mode-selector-bottom {
			display: flex !important;
			align-items: center;
			gap: 8px;
			padding: 8px 0;
			border-bottom: 1px solid #F0F0F0;
			margin-bottom: 4px;
		}
		
		.mode-label-bottom {
			font-size: 13px;
			color: #666;
			font-weight: 500;
			white-space: nowrap;
		}
		
		.mode-select-bottom {
			padding: 6px 12px;
			border: 1px solid #E5E5E5;
			border-radius: 6px;
			background: #FFFFFF;
			font-size: 13px;
			color: #000;
			cursor: pointer;
			outline: none;
			transition: all 0.2s;
			flex: 1;
			max-width: 300px;
		}
		
		.mode-select-bottom:hover {
			border-color: #000;
		}
		
		.mode-select-bottom:focus {
			border-color: #000;
			box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
		}
		
		.input-row {
			display: flex;
			gap: 12px;
			align-items: flex-end;
		}
		
		.input-wrapper {
			flex: 1;
			position: relative;
		}
		
		.message-input {
			width: 100%;
			min-height: 44px;
			max-height: 200px;
			padding: 12px 16px;
			border: 1px solid #E5E5E5;
			border-radius: 24px;
			font-size: 14px;
			font-family: inherit;
			resize: none;
			outline: none;
			background: #FAFAFA;
			transition: all 0.2s;
		}
		
		.message-input:focus {
			border-color: #000;
			background: #FFF;
		}
		
		.send-button {
			width: 44px;
			height: 44px;
			border-radius: 50%;
			background: #000;
			border: none;
			color: #FFF;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.2s;
			flex-shrink: 0;
		}
		
		.send-button:hover:not(:disabled) {
			background: #333;
			transform: scale(1.05);
		}
		
		.send-button:disabled {
			background: #CCC;
			cursor: not-allowed;
		}
		
		.send-button svg {
			width: 20px;
			height: 20px;
		}
		
		@media (max-width: 980px) {
			.sidebar {
				display: none;
			}
		}
	</style>
</head>
<body class="aw">
	{% include 'shared/header.html' %}
	
	<div class="mental-health-container">
		<aside class="sidebar">
			<div class="sidebar-title">对话历史</div>
			<div id="historyList" class="history-list"></div>
		</aside>
		
		<div class="main-workspace">
			<div class="header-toolbar">
				<div class="header-title">心理咨询助手</div>
			</div>
			
			<div class="chat-area">
				<div id="chatMessages" class="chat-messages">
					<div class="empty-state" id="emptyState">
						<div class="empty-state-icon">💬</div>
						<div class="empty-state-text">开始你的心理咨询</div>
						<div class="empty-state-hint">输入你的问题，我会为你提供专业的心理健康建议</div>
					</div>
				</div>
			</div>
			
			<div class="input-area">
				<div class="input-container">
					<div class="mode-selector-bottom">
						<span class="mode-label-bottom">回答模式：</span>
						<select id="modeSelect" class="mode-select-bottom" title="选择问答模式">
							<option value="rag">抽取式问答（RAG）</option>
							<option value="generative">生成式问答</option>
							<option value="rule_based">基于规则的问答</option>
						</select>
					</div>
					<div class="input-row">
						<div class="input-wrapper">
							<textarea 
								id="messageInput" 
								class="message-input" 
								placeholder="输入你的问题..."
								rows="1"
							></textarea>
						</div>
						<button id="sendButton" class="send-button" type="button">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<line x1="22" y1="2" x2="11" y2="13"></line>
								<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
							</svg>
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<script>
		const chatMessages = document.getElementById('chatMessages');
		const messageInput = document.getElementById('messageInput');
		const sendButton = document.getElementById('sendButton');
		const historyList = document.getElementById('historyList');
		const emptyState = document.getElementById('emptyState');
		const modeSelect = document.getElementById('modeSelect');
		
		// 调试：检查模式选择器是否存在
		if (modeSelect) {
			console.log('✅ 模式选择器已找到');
		} else {
			console.error('❌ 模式选择器未找到！');
		}
		
		// 对话历史
		let conversations = [];
		let currentConversationId = null;
		let currentMode = 'rag'; // 默认模式
		
		// 用户信息（包括头像）
		let currentUser = null;
		
		// 获取用户信息
		function getUserInfo() {
			try {
				const userStr = localStorage.getItem('yuni_user');
				if (userStr) {
					currentUser = JSON.parse(userStr);
					console.log('已加载用户信息:', currentUser);
				} else {
					currentUser = null;
				}
			} catch (e) {
				console.error('获取用户信息失败:', e);
				currentUser = null;
			}
		}
		
		// 页面加载时获取用户信息
		getUserInfo();
		
		// 监听localStorage变化，以便在用户上传新头像后自动更新
		window.addEventListener('storage', function(e) {
			if (e.key === 'yuni_user') {
				getUserInfo();
				console.log('用户信息已更新');
			}
		});
		
		// 也监听同页面内的localStorage变化（通过自定义事件）
		const originalSetItem = localStorage.setItem;
		localStorage.setItem = function(key, value) {
			originalSetItem.apply(this, arguments);
			if (key === 'yuni_user') {
				window.dispatchEvent(new Event('storage'));
				getUserInfo();
			}
		};
		
		// 监听模式变化
		if (modeSelect) {
			modeSelect.addEventListener('change', function() {
				currentMode = this.value;
				console.log('模式已切换为:', currentMode);
			});
		}
		
		// 自动调整输入框高度
		messageInput.addEventListener('input', function() {
			this.style.height = 'auto';
			this.style.height = Math.min(this.scrollHeight, 200) + 'px';
		});
		
		// 发送消息
		async function sendMessage() {
			const query = messageInput.value.trim();
			if (!query || sendButton.disabled) return;
			
			// 隐藏空状态
			if (emptyState) {
				emptyState.style.display = 'none';
			}
			
			// 添加用户消息
			addMessage('user', query);
			
			// 清空输入框
			messageInput.value = '';
			messageInput.style.height = 'auto';
			
			// 禁用发送按钮
			sendButton.disabled = true;
			
			// 显示加载状态
			const loadingId = addLoadingMessage();
			
			try {
				// 获取当前选择的模式
				const selectedMode = modeSelect.value;
				currentMode = selectedMode;
				
				// 调用 API
				const response = await fetch('/api/qa/ask', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify({
						query: query,
						mode: selectedMode
					})
				});
				
				// 移除加载状态
				removeLoadingMessage(loadingId);
				
				if (!response.ok) {
					const errorData = await response.json().catch(() => ({ detail: '请求失败' }));
					throw new Error(errorData.detail || `HTTP ${response.status}`);
				}
				
				const data = await response.json();
				
				// 添加 AI 回复（包含使用的模式）
				addMessage('ai', data.answer, data.sources || [], data.method || currentMode);
				
				// 保存对话历史（同时保存到localStorage和数据库）
				const conversationId = data.conversation_id || Date.now().toString();
				await saveConversation(conversationId, query, data.answer, data.sources || [], data.method || currentMode);
				
			} catch (error) {
				// 移除加载状态
				removeLoadingMessage(loadingId);
				
				// 显示错误消息
				addMessage('ai', `抱歉，处理你的问题时出现了错误：${error.message}`, []);
				console.error('发送消息失败:', error);
			} finally {
				// 启用发送按钮
				sendButton.disabled = false;
				messageInput.focus();
			}
		}
		
		// 添加消息
		function addMessage(role, content, sources = [], method = null) {
			// 隐藏空状态（如果有消息）
			if (emptyState) {
				emptyState.style.display = 'none';
			}
			
			const messageDiv = document.createElement('div');
			messageDiv.className = `message ${role}`;
			
			const avatar = document.createElement('div');
			avatar.className = 'message-avatar';
			const avatarImg = document.createElement('img');
			if (role === 'user') {
				// 用户头像：如果用户已上传头像，使用用户头像；否则使用默认头像
				if (currentUser && currentUser.avatar) {
					avatarImg.src = currentUser.avatar;
					avatarImg.alt = '用户';
					// 如果头像加载失败，回退到默认头像
					avatarImg.onerror = function() {
						this.src = '/static/user-avatar.svg';
					};
				} else {
					avatarImg.src = '/static/user-avatar.svg';
					avatarImg.alt = '用户';
				}
			} else {
				// AI logo - 使用程序logo
				avatarImg.src = '/static/favicon.svg';
				avatarImg.alt = 'YuNi AI';
			}
			avatar.appendChild(avatarImg);
			
			const contentDiv = document.createElement('div');
			contentDiv.className = 'message-content';
			
			const bubble = document.createElement('div');
			bubble.className = 'message-bubble';
			bubble.textContent = content;
			
			// 如果是AI消息，显示使用的模式
			if (role === 'ai' && method) {
				const methodLabel = document.createElement('div');
				methodLabel.style.cssText = 'font-size: 11px; color: #999; margin-top: 4px; font-style: italic;';
				const methodNames = {
					'rag': '抽取式问答（RAG）',
					'extractive': '抽取式问答',
					'generative': '生成式问答',
					'rule_based': '基于规则的问答',
					'simple_rules': '基于规则的问答',
					'chinese_qa': '中文问答模型'
				};
				methodLabel.textContent = `使用模式: ${methodNames[method] || method}`;
				bubble.appendChild(methodLabel);
			}
			
			contentDiv.appendChild(bubble);
			
			// 如果有参考来源，添加来源显示
			if (sources && sources.length > 0) {
				const sourcesDiv = document.createElement('div');
				sourcesDiv.className = 'message-sources';
				
				const title = document.createElement('div');
				title.className = 'message-sources-title';
				title.textContent = '参考来源';
				
				sourcesDiv.appendChild(title);
				
				sources.forEach((source, index) => {
					const sourceItem = document.createElement('div');
					sourceItem.className = 'source-item';
					
					const sourceContent = document.createElement('div');
					sourceContent.className = 'source-content';
					sourceContent.textContent = source.content || '';
					
					const sourceScore = document.createElement('div');
					sourceScore.className = 'source-score';
					sourceScore.textContent = `相似度: ${(source.score * 100).toFixed(1)}%`;
					
					sourceItem.appendChild(sourceContent);
					sourceItem.appendChild(sourceScore);
					sourcesDiv.appendChild(sourceItem);
				});
				
				contentDiv.appendChild(sourcesDiv);
			}
			
			messageDiv.appendChild(avatar);
			messageDiv.appendChild(contentDiv);
			
			chatMessages.appendChild(messageDiv);
			
			// 滚动到底部
			scrollToBottom();
		}
		
		// 添加加载消息
		function addLoadingMessage() {
			const loadingDiv = document.createElement('div');
			loadingDiv.className = 'message ai';
			loadingDiv.id = 'loading-message';
			
			const avatar = document.createElement('div');
			avatar.className = 'message-avatar';
			const avatarImg = document.createElement('img');
			avatarImg.src = '/static/favicon.svg';
			avatarImg.alt = 'YuNi AI';
			avatar.appendChild(avatarImg);
			
			const loadingContent = document.createElement('div');
			loadingContent.className = 'loading-message';
			
			const text = document.createElement('span');
			text.className = 'loading-text';
			text.textContent = '正在翻阅心理学书籍';
			
			const dots = document.createElement('div');
			dots.className = 'loading-dots';
			for (let i = 0; i < 3; i++) {
				const dot = document.createElement('div');
				dot.className = 'loading-dot';
				dots.appendChild(dot);
			}
			
			loadingContent.appendChild(text);
			loadingContent.appendChild(dots);
			
			loadingDiv.appendChild(avatar);
			loadingDiv.appendChild(loadingContent);
			
			chatMessages.appendChild(loadingDiv);
			scrollToBottom();
			
			return 'loading-message';
		}
		
		// 移除加载消息
		function removeLoadingMessage(id) {
			const loadingMsg = document.getElementById(id);
			if (loadingMsg) {
				loadingMsg.remove();
			}
		}
		
		// 滚动到底部
		function scrollToBottom() {
			const chatArea = document.querySelector('.chat-area');
			chatArea.scrollTop = chatArea.scrollHeight;
		}
		
		// 保存对话历史（同时保存到localStorage和数据库）
		async function saveConversation(conversationId, query, answer, sources, method) {
			const conversation = {
				id: conversationId,
				query: query,
				answer: answer,
				sources: sources,
				method: method,
				timestamp: Date.now()
			};
			
			// 保存到localStorage
			conversations.push(conversation);
			localStorage.setItem('mental_health_conversations', JSON.stringify(conversations));
			
			// 保存到数据库
			try {
				const response = await fetch('/api/qa/conversation/save', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded',
					},
					body: new URLSearchParams({
						conversation_id: conversationId,
						query: query,
						answer: answer,
						method: method || 'rag',
						sources: JSON.stringify(sources),
						uid: '0'  // 默认未登录用户，后续可以从用户信息获取
					})
				});
				
				if (!response.ok) {
					console.warn('保存对话到数据库失败:', await response.text());
				}
			} catch (error) {
				console.error('保存对话到数据库出错:', error);
			}
			
			// 更新历史列表
			updateHistoryList();
		}
		
		// 删除单个对话
		async function deleteConversation(conversationId) {
			if (!confirm('确定要删除这条对话记录吗？')) {
				return;
			}
			
			try {
				// 从localStorage删除
				conversations = conversations.filter(c => c.id !== conversationId);
				localStorage.setItem('mental_health_conversations', JSON.stringify(conversations));
				
				// 从数据库删除
				const response = await fetch('/api/qa/conversation/delete', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify({
						conversation_id: conversationId,
						delete_all: false,
						uid: 0
					})
				});
				
				if (!response.ok) {
					console.warn('从数据库删除对话失败:', await response.text());
				}
				
				// 如果删除的是当前显示的对话，清空显示
				if (currentConversationId === conversationId) {
					chatMessages.innerHTML = '';
					if (emptyState) {
						emptyState.style.display = 'flex';
					}
					currentConversationId = null;
				}
				
				// 更新历史列表
				updateHistoryList();
			} catch (error) {
				console.error('删除对话出错:', error);
				alert('删除失败，请重试');
			}
		}
		
		// 删除所有对话
		async function deleteAllConversations() {
			try {
				// 清空localStorage
				conversations = [];
				localStorage.removeItem('mental_health_conversations');
				
				// 从数据库删除所有
				const response = await fetch('/api/qa/conversation/delete', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify({
						delete_all: true,
						uid: 0
					})
				});
				
				if (!response.ok) {
					console.warn('从数据库删除所有对话失败:', await response.text());
				}
				
				// 清空显示
				chatMessages.innerHTML = '';
				if (emptyState) {
					emptyState.style.display = 'flex';
				}
				currentConversationId = null;
				
				// 更新历史列表
				updateHistoryList();
			} catch (error) {
				console.error('删除所有对话出错:', error);
				alert('删除失败，请重试');
			}
		}
		
		// 更新历史列表
		function updateHistoryList() {
			if (!historyList) return;
			
			if (conversations.length === 0) {
				historyList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999; font-size: 14px;">暂无对话历史</div>';
				return;
			}
			
			historyList.innerHTML = conversations.slice().reverse().map(conv => {
				const date = new Date(conv.timestamp);
				const time = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
				const preview = conv.query.length > 20 ? conv.query.substring(0, 20) + '...' : conv.query;
				
				return `
					<div class="history-item" data-id="${conv.id}">
						<div class="history-item-title">${preview}</div>
						<div class="history-item-time">${time}</div>
						<div class="history-item-actions">
							<span class="history-delete-btn" data-id="${conv.id}" onclick="event.stopPropagation(); deleteConversation('${conv.id}')">删除</span>
						</div>
					</div>
				`;
			}).join('');
			
			// 添加清空所有按钮
			if (conversations.length > 0) {
				const clearAllBtn = document.createElement('div');
				clearAllBtn.className = 'clear-all-btn';
				clearAllBtn.textContent = '清空所有历史';
				clearAllBtn.onclick = () => {
					if (confirm('确定要删除所有对话历史吗？此操作不可恢复。')) {
						deleteAllConversations();
					}
				};
				historyList.appendChild(clearAllBtn);
			}
			
			// 添加点击事件
			historyList.querySelectorAll('.history-item').forEach(item => {
				item.style.cursor = 'pointer';
				item.addEventListener('click', function(e) {
					// 如果点击的是删除按钮，不加载对话
					if (e.target.classList.contains('history-delete-btn')) {
						return;
					}
					e.preventDefault();
					e.stopPropagation();
					const id = this.getAttribute('data-id');
					console.log('点击历史项，ID:', id);
					if (id) {
						loadConversation(id);
					} else {
						console.error('历史项没有data-id属性');
					}
				});
			});
		}
		
		// 加载对话
		function loadConversation(id) {
			console.log('加载对话，ID:', id);
			const conversation = conversations.find(c => c.id === id);
			if (!conversation) {
				console.error('未找到对话，ID:', id);
				return;
			}
			
			console.log('找到对话:', conversation);
			
			// 清空当前消息
			chatMessages.innerHTML = '';
			
			// 隐藏空状态
			if (emptyState) {
				emptyState.style.display = 'none';
			}
			
			// 显示对话
			addMessage('user', conversation.query);
			addMessage('ai', conversation.answer, conversation.sources || [], conversation.method || 'rag');
			
			// 更新活动状态
			historyList.querySelectorAll('.history-item').forEach(item => {
				item.classList.remove('active');
				if (item.getAttribute('data-id') === id) {
					item.classList.add('active');
				}
			});
			
			currentConversationId = id;
			
			// 滚动到底部
			scrollToBottom();
		}
		
		// 加载保存的对话历史
		function loadSavedConversations() {
			try {
				const saved = localStorage.getItem('mental_health_conversations');
				if (saved) {
					conversations = JSON.parse(saved);
					updateHistoryList();
				}
			} catch (error) {
				console.error('加载对话历史失败:', error);
			}
		}
		
		// 事件监听
		sendButton.addEventListener('click', sendMessage);
		
		messageInput.addEventListener('keydown', (e) => {
			if (e.key === 'Enter' && !e.shiftKey) {
				e.preventDefault();
				sendMessage();
			}
		});
		
		// 初始化
		loadSavedConversations();
		messageInput.focus();
	</script>
</body>
</html>
