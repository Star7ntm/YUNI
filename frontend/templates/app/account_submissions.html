{% extends 'app/account_base.html' %}
{% block content %}
<style>
	.account-submissions-table {
		width: 100%;
		border-collapse: collapse;
		margin-top: 24px;
	}
	
	.account-submissions-table thead {
		border-bottom: 1px solid #E5E5E5;
	}
	
	.account-submissions-table th {
		text-align: left;
		padding: 12px 16px;
		font-size: 13px;
		font-weight: 600;
		color: #888;
		text-transform: uppercase;
		letter-spacing: 0.5px;
	}
	
	.account-submissions-table td {
		padding: 16px;
		font-size: 14px;
		color: #333;
		border-bottom: 1px solid #F5F5F5;
	}
	
	.account-submissions-table tbody tr:hover {
		background: #F5F5F7;
	}
	
	.account-submissions-table tbody tr:last-child td {
		border-bottom: none;
	}
	
	.account-submissions-status {
		display: inline-block;
		padding: 4px 12px;
		border-radius: 12px;
		font-size: 12px;
		font-weight: 600;
		text-transform: uppercase;
		letter-spacing: 0.5px;
	}
	
	.account-submissions-status-completed {
		background: #F0F9F4;
		color: #000;
	}
	
	.account-submissions-status-processing {
		background: #F5F5F7;
		color: #000;
	}
	
	.account-submissions-status-failed {
		background: #FEF2F2;
		color: #000;
	}
	
	.account-submissions-empty {
		text-align: center;
		padding: 80px 20px;
		color: #888;
	}
	
	.account-submissions-empty svg {
		width: 64px;
		height: 64px;
		margin: 0 auto 16px;
		stroke: #E5E5E5;
	}
	
	.account-submissions-empty h3 {
		font-size: 18px;
		font-weight: 600;
		color: #333;
		margin-bottom: 8px;
	}
	
	.account-submissions-empty p {
		font-size: 14px;
		color: #888;
	}
</style>

<div id="submissionsContainer">
	<div class="account-submissions-empty" id="emptyState" style="display:none;">
		<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
			<line x1="8" y1="6" x2="21" y2="6"></line>
			<line x1="8" y1="12" x2="21" y2="12"></line>
			<line x1="8" y1="18" x2="21" y2="18"></line>
			<line x1="3" y1="6" x2="3.01" y2="6"></line>
			<line x1="3" y1="12" x2="3.01" y2="12"></line>
			<line x1="3" y1="18" x2="3.01" y2="18"></line>
		</svg>
		<h3>暂无提交记录</h3>
		<p>您的识别任务将显示在这里</p>
	</div>
	
	<table class="account-submissions-table" id="submissionsTable" style="display:none;">
		<thead>
			<tr>
				<th>文件名称</th>
				<th>类型</th>
				<th>日期</th>
				<th>状态</th>
			</tr>
		</thead>
		<tbody id="submissionsBody">
		</tbody>
	</table>
</div>

<script>
(function() {
	const token = localStorage.getItem('yuni_token') || '';
	
	function formatDate(timestamp) {
		const date = new Date(timestamp * 1000);
		const year = date.getFullYear();
		const month = String(date.getMonth() + 1).padStart(2, '0');
		const day = String(date.getDate()).padStart(2, '0');
		const hours = String(date.getHours()).padStart(2, '0');
		const minutes = String(date.getMinutes()).padStart(2, '0');
		return `${year}/${month}/${day} ${hours}:${minutes}`;
	}
	
	function getStatusClass(status) {
		if(status === 'completed' || status === 'done') {
			return 'account-submissions-status-completed';
		} else if(status === 'processing' || status === 'pending') {
			return 'account-submissions-status-processing';
		} else {
			return 'account-submissions-status-failed';
		}
	}
	
	function getStatusText(status) {
		if(status === 'completed' || status === 'done') {
			return '已完成';
		} else if(status === 'processing' || status === 'pending') {
			return '处理中';
		} else {
			return '失败';
		}
	}
	
	function getFileType(filename) {
		const ext = filename.split('.').pop()?.toLowerCase() || '';
		if(['wav', 'mp3', 'm4a', 'ogg', 'webm'].includes(ext)) {
			return '音频';
		} else if(['mp4', 'avi', 'mov', 'mkv'].includes(ext)) {
			return '视频';
		}
		return '未知';
	}
	
	if(token) {
		fetch('/api/history', {
			headers: {
				'Authorization': `Bearer ${token}`
			}
		})
		.then(r => r.json())
		.then(d => {
			const items = d.items || [];
			const emptyState = document.getElementById('emptyState');
			const table = document.getElementById('submissionsTable');
			const tbody = document.getElementById('submissionsBody');
			
			if(items.length === 0) {
				emptyState.style.display = 'block';
				table.style.display = 'none';
			} else {
				emptyState.style.display = 'none';
				table.style.display = 'table';
				
				tbody.innerHTML = items.slice(0, 50).map(item => {
					const filename = item.audio || '未知文件';
					const fileType = getFileType(filename);
					const date = formatDate(item.ts || 0);
					const status = item.status || 'completed';
					
					return `
						<tr>
							<td>${filename}</td>
							<td>${fileType}</td>
							<td>${date}</td>
							<td>
								<span class="account-submissions-status ${getStatusClass(status)}">
									${getStatusText(status)}
								</span>
							</td>
						</tr>
					`;
				}).join('');
			}
		})
		.catch(e => {
			console.error('加载提交记录失败:', e);
			document.getElementById('emptyState').style.display = 'block';
		});
	} else {
		document.getElementById('emptyState').style.display = 'block';
	}
})();
</script>
{% endblock %}
