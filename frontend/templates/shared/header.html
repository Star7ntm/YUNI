<script>
(function(){
	// auth state
	try{
		const u = JSON.parse(localStorage.getItem('yuni_user')||'null');
		const token = localStorage.getItem('yuni_token');
		const navAuth = document.getElementById('navAuth');
		const navRegister = document.getElementById('navRegister');
		const userDropdown = document.getElementById('userDropdown');
		const userDropdownBtn = document.getElementById('userDropdownBtn');
		const userDropdownMenu = document.getElementById('userDropdownMenu');
		const headerUserName = document.getElementById('headerUserName');
		const headerAvatarPlaceholder = document.getElementById('headerAvatarPlaceholder');
		const headerAvatarImage = document.getElementById('headerAvatarImage');
		const dropdownLogout = document.getElementById('dropdownLogout');
		
		// 观看演示按钮 - 视频播放功能
		const watchDemoBtn = document.getElementById('watchDemoBtn');
		const videoOverlay = document.getElementById('videoPlayerOverlay');
		const videoPlayer = document.getElementById('videoPlayer');
		const videoPlayerClose = document.getElementById('videoPlayerClose');
		
		if(watchDemoBtn && videoOverlay && videoPlayer){
			const videoPlayerSource = document.getElementById('videoPlayerSource');
			const videoPlayerLoading = document.getElementById('videoPlayerLoading');
			const videoPlayerError = document.getElementById('videoPlayerError');
			
			// 关闭视频播放器的函数
			function closeVideoPlayer(){
				videoOverlay.classList.remove('active', 'loading', 'error');
				videoPlayer.pause();
				videoPlayer.currentTime = 0;
				videoPlayer.src = '';
				if(videoPlayerSource) videoPlayerSource.src = '';
			}
			
			// 点击观看演示按钮
			watchDemoBtn.addEventListener('click', function(){
				// TODO: 将视频路径替换为实际的演示视频路径
				// 例如：const videoPath = '/static/demo-video.mp4';
				const videoPath = '/static/demo-video.mp4'; // 请替换为实际视频路径
				
				// 显示加载状态
				videoOverlay.classList.remove('error');
				videoOverlay.classList.add('active', 'loading');
				
				// 设置视频源
				if(videoPlayerSource){
					videoPlayerSource.src = videoPath;
					videoPlayer.load();
				}else{
					videoPlayer.src = videoPath;
				}
				
				// 监听视频加载事件
				videoPlayer.addEventListener('loadeddata', function(){
					videoOverlay.classList.remove('loading');
					videoPlayer.play().catch(function(error) {
						console.log('视频播放失败:', error);
						videoOverlay.classList.remove('loading');
						videoOverlay.classList.add('error');
					});
				}, { once: true });
				
				// 监听视频加载错误
				videoPlayer.addEventListener('error', function(){
					console.log('视频加载失败');
					videoOverlay.classList.remove('loading');
					videoOverlay.classList.add('error');
					// 3秒后自动关闭错误提示
					setTimeout(function(){
						if(videoOverlay.classList.contains('error')){
							closeVideoPlayer();
						}
					}, 3000);
				}, { once: true });
			});
			
			// 视频播放结束后自动关闭
			videoPlayer.addEventListener('ended', function(){
				closeVideoPlayer();
			});
			
			// 点击关闭按钮
			if(videoPlayerClose){
				videoPlayerClose.addEventListener('click', function(){
					closeVideoPlayer();
				});
			}
			
			// 点击背景关闭（点击overlay但不点击视频容器）
			videoOverlay.addEventListener('click', function(e){
				if(e.target === videoOverlay){
					closeVideoPlayer();
				}
			});
			
			// ESC键关闭
			document.addEventListener('keydown', function(e){
				if(e.key === 'Escape' && videoOverlay.classList.contains('active')){
					closeVideoPlayer();
				}
			});
		}
		
		if(u && (u.username||u.name) && token){
			// 已登录：隐藏登录和注册按钮，显示用户下拉菜单
			// 观看演示按钮始终显示
			if(navAuth) navAuth.style.display = 'none';
			if(navRegister) navRegister.style.display = 'none';
			if(userDropdown) userDropdown.style.display = 'block';
			if(watchDemoBtn) watchDemoBtn.style.display = 'inline-block';
			
			// 设置用户名
			if(headerUserName){
				headerUserName.textContent = u.username || u.name || '用户';
			}
			
			// 设置头像
			if(u.avatar && headerAvatarImage){
				headerAvatarImage.src = u.avatar;
				headerAvatarImage.style.display = 'block';
				if(headerAvatarPlaceholder) headerAvatarPlaceholder.style.display = 'none';
				// 添加错误处理：图片加载失败时显示占位符
				headerAvatarImage.onerror = function() {
					this.style.display = 'none';
					if(headerAvatarPlaceholder) headerAvatarPlaceholder.style.display = 'block';
				};
			}else if(headerAvatarPlaceholder){
				headerAvatarPlaceholder.style.display = 'block';
				if(headerAvatarImage) headerAvatarImage.style.display = 'none';
			}
			
			// 下拉菜单切换
			if(userDropdownBtn && userDropdownMenu){
				userDropdownBtn.addEventListener('click', function(e){
					e.stopPropagation();
					const isVisible = userDropdownMenu.classList.contains('show');
					if(isVisible){
						userDropdownMenu.classList.remove('show');
						setTimeout(function(){
							if(!userDropdownMenu.classList.contains('show')){
								userDropdownMenu.style.display = 'none';
							}
						}, 200);
					}else{
						userDropdownMenu.style.display = 'block';
						// 触发重排以触发动画
						userDropdownMenu.offsetHeight;
						setTimeout(function(){
							userDropdownMenu.classList.add('show');
						}, 10);
					}
					userDropdownBtn.classList.toggle('active', !isVisible);
				});
				
				// 点击外部关闭菜单
				document.addEventListener('click', function(e){
					if(!userDropdown.contains(e.target)){
						userDropdownMenu.style.display = 'none';
						userDropdownMenu.classList.remove('show');
						userDropdownBtn.classList.remove('active');
					}
				});
			}
			
			// 退出登录
			if(dropdownLogout){
				dropdownLogout.addEventListener('click', function(){
					localStorage.removeItem('yuni_user');
					localStorage.removeItem('yuni_token');
					window.location.href = '/login';
				});
			}
		}else{
			// 未登录：显示登录和注册按钮，隐藏用户下拉菜单
			if(navAuth) navAuth.style.display = 'inline-block';
			if(navRegister) navRegister.style.display = 'inline-block';
			if(userDropdown) userDropdown.style.display = 'none';
		}
	}catch(e){
		console.error('Header auth check failed:', e);
		// 出错时显示登录和注册按钮
		const navAuth = document.getElementById('navAuth');
		const navRegister = document.getElementById('navRegister');
		const userDropdown = document.getElementById('userDropdown');
		if(navAuth) navAuth.style.display = 'inline-block';
		if(navRegister) navRegister.style.display = 'inline-block';
		if(userDropdown) userDropdown.style.display = 'none';
	}
	
	// ========== 顶栏收回功能 ==========
	// 配置参数 - 可以在这里微调
	const HEADER_CONFIG = {
		scrollThreshold: 50,           // 滚动阈值（像素），页面顶部多少像素内不隐藏顶栏
		hideDelay: 150,               // 隐藏延迟（毫秒），向下滚动后多久隐藏（建议：100-300）
		showDelay: 0,                 // 显示延迟（毫秒），向上滚动后多久显示（建议：0-100）
		scrollSpeedThreshold: 10,     // 滚动速度阈值，快速滚动时立即响应（建议：5-20）
		enableOnMobile: true          // 是否在移动端启用
	};
	
	const headerNav = document.getElementById('headerNav');
	if(headerNav){
		let lastScrollY = window.scrollY;
		let scrollDirection = 0; // 1 = 向下, -1 = 向上
		let hideTimeout = null;
		let showTimeout = null;
		
		// 检查是否在移动端
		const isMobile = window.innerWidth <= 768;
		if(!HEADER_CONFIG.enableOnMobile && isMobile){
			// 移动端禁用，直接返回
			return;
		}
		
		function updateHeader(){
			const currentScrollY = window.scrollY;
			const scrollDelta = currentScrollY - lastScrollY;
			const scrollSpeed = Math.abs(scrollDelta);
			
			// 清除之前的定时器
			if(hideTimeout) clearTimeout(hideTimeout);
			if(showTimeout) clearTimeout(showTimeout);
			
			// 在页面顶部时始终显示（修复：使用合理的阈值）
			if(currentScrollY <= HEADER_CONFIG.scrollThreshold){
				headerNav.classList.remove('hidden');
				headerNav.classList.add('visible');
				lastScrollY = currentScrollY;
				return;
			}
			
			// 快速滚动时立即响应（修复：先检查快速滚动，避免被顶部判断拦截）
			if(scrollSpeed > HEADER_CONFIG.scrollSpeedThreshold){
				if(scrollDelta > 0){
					// 向下滚动 - 立即隐藏
					headerNav.classList.remove('visible');
					headerNav.classList.add('hidden');
				}else{
					// 向上滚动 - 立即显示
					headerNav.classList.remove('hidden');
					headerNav.classList.add('visible');
				}
				lastScrollY = currentScrollY;
				return;
			}
			
			// 正常滚动速度 - 使用延迟
			if(scrollDelta > 0){
				// 向下滚动 - 延迟隐藏
				scrollDirection = 1;
				hideTimeout = setTimeout(() => {
					headerNav.classList.remove('visible');
					headerNav.classList.add('hidden');
				}, HEADER_CONFIG.hideDelay);
			}else if(scrollDelta < 0){
				// 向上滚动 - 延迟显示（通常立即显示）
				scrollDirection = -1;
				showTimeout = setTimeout(() => {
					headerNav.classList.remove('hidden');
					headerNav.classList.add('visible');
				}, HEADER_CONFIG.showDelay);
			}
			
			lastScrollY = currentScrollY;
		}
		
		// 使用节流优化性能
		let ticking = false;
		function onScroll(){
			if(!ticking){
				window.requestAnimationFrame(() => {
					updateHeader();
					ticking = false;
				});
				ticking = true;
			}
		}
		
		// 初始化：页面顶部时显示
		headerNav.classList.add('visible');
		
		// 监听滚动事件
		window.addEventListener('scroll', onScroll, { passive: true });
		
		// 鼠标移入顶栏区域时显示（即使正在滚动）
		headerNav.addEventListener('mouseenter', () => {
			if(hideTimeout) clearTimeout(hideTimeout);
			headerNav.classList.remove('hidden');
			headerNav.classList.add('visible');
		});
	}
})();
</script>
