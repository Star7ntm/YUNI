<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/static/styles.css">
	<script src="/static/smooth-scroll.js" defer></script>
	<title>登录 - YuNi</title>
	<style>
		.shell{min-height:100vh; display:flex; align-items:center;}
		.grid2{ width:100%; max-width:1100px; margin:0 auto; padding:24px; display:grid; grid-template-columns:1.2fr 1fr; gap:24px }
		@media (max-width:980px){ .grid2{ grid-template-columns:1fr } }
		.left .card{ padding:28px; height:100% }
		.right .card{ padding:28px }
		.bullets{ display:grid; gap:10px; margin-top:14px }
		.bullets .badge{ width:max-content }
	</style>
</head>
<body class="aw">
	{% include 'shared/header.html' %}
	<div class="aw-bg-orb one"></div>
	<div class="aw-bg-orb two"></div>
	<div class="shell container grid2">
		<div class="left">
			<div class="card">
				<div class="hero"><h1 class="hero-title">更快进入你的工作流</h1><div class="hero-sub">统一的语音识别与账户平台</div></div>
				<div class="bullets">
					<span class="badge">集中管理 · 账户与任务</span>
					<span class="badge">极速体验 · 本地离线模型</span>
					<span class="badge">稳定可靠 · 历史持久化</span>
				</div>
				<div class="actions" style="margin-top:16px">
					<a class="btn" href="/register">创建账户</a>
					<a class="btn secondary" href="/whisper">先去体验识别</a>
				</div>
			</div>
		</div>
		<div class="right">
			<div class="card">
				<div class="hero"><h1 class="hero-title">登录</h1><div class="hero-sub">欢迎回来</div></div>
				<form id="loginForm">
					<label>用户名</label>
					<input class="input" type="text" name="username" placeholder="输入用户名" autocomplete="username" required>
					<label style="margin-top:10px">密码</label>
					<input class="input" type="password" name="password" placeholder="输入密码" autocomplete="current-password" required>
					<div class="auth-actions" style="display:flex; justify-content:space-between; align-items:center; margin-top:12px">
						<a href="/home" class="badge">返回首页</a>
						<a href="/register" class="badge">没有账号？去注册</a>
						<button class="btn" type="submit">登录</button>
					</div>
				</form>
			</div>
		</div>
	</div>
	{% include 'shared/footer.html' %}
	<script>
	// 强制使用浅色主题
	document.documentElement.setAttribute('data-theme','light');
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const fd=new FormData(e.target);
    const payload={ username:String(fd.get('username')||'').trim(), password:String(fd.get('password')||'') };
    if(!payload.username||!payload.password){ alert('请填写用户名与密码'); return;}
    fetch('/api/login',{
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    }).then(r=>r.json().then(j=>({ok:r.ok,j}))).then(({ok,j})=>{
        if(!ok) throw new Error(j && (j.detail||j.error) || '登录失败');
        try{
            if(j&&j.user){ localStorage.setItem('yuni_user', JSON.stringify(j.user)); }
            if(j&&j.token){ localStorage.setItem('yuni_token', j.token); }
        }catch(_){}
        window.location.href='/main';
    }).catch(err=>alert('登录失败：'+(err.message||err)));
});
	</script>
</body>
</html>
