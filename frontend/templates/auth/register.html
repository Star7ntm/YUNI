<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/static/styles.css">
	<script src="/static/smooth-scroll.js" defer></script>
	<title>注册 - YuNi</title>
	<style>
		.shell{min-height:100vh; display:flex; align-items:center;}
		.grid2{ width:100%; max-width:1100px; margin:0 auto; padding:24px; display:grid; grid-template-columns:1.2fr 1fr; gap:24px }
		@media (max-width:980px){ .grid2{ grid-template-columns:1fr } }
		.left .card{ padding:28px; height:100% }
		.right .card{ padding:28px }
		.grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px }
		@media (max-width:760px){ .grid-2{ grid-template-columns:1fr } }
	</style>
</head>
<body class="aw">
	{% include 'shared/header.html' %}
	<div class="aw-bg-orb one"></div>
	<div class="aw-bg-orb two"></div>
	<div class="shell container grid2">
		<div class="left">
			<div class="card">
				<div class="hero"><h1 class="hero-title">开始你的智能工作流</h1><div class="hero-sub">几秒钟完成注册</div></div>
				<div class="bullets" style="display:grid; gap:10px; margin-top:14px">
					<span class="badge">更快更稳 · 本地模型</span>
					<span class="badge">优雅界面 · 专注体验</span>
					<span class="badge">隐私守护 · SQLite 本地存储</span>
				</div>
			</div>
		</div>
		<div class="right">
			<div class="card">
				<div class="hero"><h1 class="hero-title">创建账户</h1><div class="hero-sub">欢迎加入 YuNi</div></div>
				<form id="regForm">
					<div class="grid-2">
						<div>
							<label>用户名</label>
							<input class="input" type="text" name="username" placeholder="输入用户名" autocomplete="username" required>
						</div>
						<div>
							<label>密码</label>
							<input class="input" type="password" name="password" placeholder="至少6位，含大小写与数字" autocomplete="new-password" required>
						</div>
						<div>
							<label>姓名（可选）</label>
							<input class="input" type="text" name="name" placeholder="真实姓名（可选）">
						</div>
						<div>
							<label>邮箱（可选）</label>
							<input class="input" type="email" name="email" placeholder="name@example.com">
						</div>
						<div>
							<label>电话（可选）</label>
							<input class="input" type="tel" name="phone" placeholder="手机号">
						</div>
					</div>
					<div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px">
						<a href="/login" class="badge">已有账号？去登录</a>
						<button class="btn" type="submit">注册</button>
					</div>
				</form>
			</div>
		</div>
	</div>
	{% include 'shared/footer.html' %}
	<script>
	// 强制使用浅色主题
	document.documentElement.setAttribute('data-theme','light');
	document.getElementById('regForm').addEventListener('submit', function(e){ e.preventDefault(); const fd=new FormData(e.target); const payload={ username:String(fd.get('username')||'').trim(), password:String(fd.get('password')||''), name:String(fd.get('name')||''), email:String(fd.get('email')||''), phone:String(fd.get('phone')||'') }; if(!payload.username||!payload.password){ alert('请填写用户名与密码'); return;} fetch('/api/register',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).then(r=>r.json().then(j=>({ok:r.ok,j}))).then(({ok,j})=>{ if(!ok) throw new Error(j && (j.detail||j.error) || '注册失败'); alert('注册成功，请登录'); window.location.href='/login'; }).catch(err=>alert('注册失败：'+(err.message||err))); });
	</script>
</body>
</html>
